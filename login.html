<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booyah Store - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html { background: #ffffff; }
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --blue-line: #007bff;
        }
        header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .logo-square { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .separator { width: 4px; height: 30px; background-color: var(--text-color); border-radius: 2px; }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; display: flex; gap: 5px; }
        .blue-text { color: #007bff; }
        .yellow-text { color: #ffc107; }
        body {
            margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif;
            background: #ffffff; color: #000000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
        }
        .auth-container {
            width: 90%; max-width: 400px; background: #ffffff;
            padding: 30px; border-radius: 20px; border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        h2 { 
            font-family: 'Orbitron', sans-serif; 
            color: #007bff; 
            text-align: center; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 8px; text-transform: uppercase; }
        .form-input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc;
            background: #f8f9fa; color: #000; box-sizing: border-box; outline: none;
        }
        .form-input:focus { border-color: #00d4ff; }
        .btn-auth {
            width: 100%; padding: 12px; background: #00d4ff; color: #000; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-family: 'Orbitron';
            transition: 0.3s;
        }
        .btn-auth:hover { box-shadow: 0 0 15px #00d4ff; }
        .switch-auth { margin-top: 20px; font-size: 0.9rem; color: #555; text-align: center; }
        .switch-auth a { color: #00d4ff; text-decoration: none; font-weight: bold; }
        .back-home { margin-top: 20px; color: #555; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <header>
            <img src="logo.jpg" alt="Logo" class="logo-square">
            <div class="separator"></div>
            <div class="brand">
                <span class="blue-text">BOOYAH</span>
                <span class="yellow-text">STORE</span>
            </div>
        </header>
        <h2><i class="fa-solid fa-lock"></i> CONNEXION</h2>
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="Ohatra: user@gmail.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPass" class="form-input" placeholder="********">
            </div>
            <button class="btn-auth" onclick="handleLogin()">SE CONNECTER</button>
        </div>
        <div class="switch-auth">
            Tsy mbola manana kaonty? <a href="register.html">Hisoratra anarana</a>
        </div>
    </div>
    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Hiverina amin'ny fandraisana</a>

    <script type="module">
        import { supabase } from './supabaseClient.js'

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            
            const { data: authData, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Fahadisoana: " + error.message);
            } else {
                // Maka ny pseudo avy ao amin'ny profiles mba ho hita ao amin'ny account.html
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('pseudo')
                    .eq('id', authData.user.id)
                    .single();
                
                if (profile) {
                    localStorage.setItem('userPseudo', profile.pseudo);
                }

                alert("Tafiditra ianao! Tongasoa eto amin'ny Booyah Store.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
